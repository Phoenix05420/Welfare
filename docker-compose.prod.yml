version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # FastAPI Backend Server & Scraper Engine
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ghcr.io/${GITHUB_REPOSITORY:-phoenix05420/welfare}/backend:latest
    container_name: welfare-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8081}
      - DATABASE_URL=${DATABASE_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      - GGUF_MODEL_PATH=${GGUF_MODEL_PATH}
      - N_GPU_LAYERS=${N_GPU_LAYERS:-0}
    volumes:
      # Optional: Persist local cache & scanned files if needed
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------------------------
  # TanStack Start Frontend Application
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ghcr.io/${GITHUB_REPOSITORY:-phoenix05420/welfare}/frontend:latest
    container_name: welfare-frontend
    restart: always
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - PORT=8081
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-logs:
