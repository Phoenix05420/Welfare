services:
  # ============================================================================
  # WelfareIntel FastAPI & Scraper Backend Service
  # ============================================================================
  - type: web
    name: welfare-backend
    runtime: docker
    rootDir: ./backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8000
      - key: FRONTEND_URL
        value: https://welfare-2ean.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://welfare-cvv8.onrender.com/auth/google/callback
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
    healthCheckPath: /docs

  # ============================================================================
  # WelfareIntel TanStack Start / Nitro Frontend Service
  # ============================================================================
  - type: web
    name: welfare-frontend
    runtime: docker
    rootDir: ./frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8081
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: https://welfare-cvv8.onrender.com
